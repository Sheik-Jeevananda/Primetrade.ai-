openapi: 3.0.0

info:
  title: Backend API
  version: 1.0.0
  description: primeTrade_ai

servers:
  - url: http://localhost:3000

paths:

  /api/v1/auth/register:
    post:
      summary: Register user
      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                name:
                  type: string

                email:
                  type: string

                password:
                  type: string

      responses:
        201:
          description: User registered successfully


  /api/v1/auth/login:
    post:
      summary: Login user

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                email:
                  type: string

                password:
                  type: string

      responses:
        200:
          description: Login successful


  /api/v1/tasks:
    get:
      summary: Get all tasks

      security:
        - bearerAuth: []

      responses:
        200:
          description: List of tasks

    post:
      summary: Create task

      security:
        - bearerAuth: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                title:
                  type: string

                description:
                  type: string

      responses:
        201:
          description: Task created


components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT